name: ByzantineTrail
options:
  bundleIdPrefix: com.byzantinetrail
  deploymentTarget:
    iOS: "17.0"
targets:
  ByzantineTrail:
    type: application
    platform: iOS
    sources:
      - path: ByzantineTrail
    info:
      path: ByzantineTrail/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.byzantinetrail.app
        DEVELOPMENT_ASSETS: ByzantineTrail/Preview Content
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
    # CloudKit entitlement deferred to M4 (no CloudKit code in M0);
    # re-add `entitlements:` with container iCloud.com.byzantinetrail.app then.
  ByzantineTrailTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ByzantineTrailTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ByzantineTrail
schemes:
  ByzantineTrail:
    build:
      targets:
        ByzantineTrail: all
        ByzantineTrailTests: [test]
    test:
      targets:
        - ByzantineTrailTests
    run:
      config: Debug
