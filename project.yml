name: ByzantineTrail
options:
  bundleIdPrefix: com.jhoedeman
  deploymentTarget:
    iOS: "17.0"
targets:
  ByzantineTrail:
    type: application
    platform: iOS
    sources:
      - path: ByzantineTrail
    info:
      path: ByzantineTrail/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jhoedeman.byzantinetrail
        DEVELOPMENT_ASSETS: ByzantineTrail/Preview Content
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
    entitlements:
      path: ByzantineTrail/ByzantineTrail.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.jhoedeman.byzantinetrail
        com.apple.developer.icloud-services:
          - CloudKit
  ByzantineTrailTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ByzantineTrailTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ByzantineTrail
schemes:
  ByzantineTrail:
    build:
      targets:
        ByzantineTrail: all
        ByzantineTrailTests: [test]
    test:
      targets:
        - ByzantineTrailTests
    run:
      config: Debug
